name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*.*.*']

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/') || contains(github.event.head_commit.message, '[release]')
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build
        run: python -m PyInstaller RGT.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get version
        id: version
        uses: actions/github-script@v9
        with:
          script: |
            if (context.ref.startsWith('refs/tags/')) {
              core.setOutput('tag', context.ref.replace('refs/tags/', ''));
            } else {
              const releases = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              const tags = releases.data.map(r => r.tag_name).filter(t => t.match(/^1\.\d+$/));
              const max = tags.length ? Math.max(...tags.map(t => parseInt(t.split('.')[1]))) : -1;
              core.setOutput('tag', `1.${max + 1}`);
            }

      - uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Rename artifacts
        run: |
          mv artifacts/build-ubuntu-latest/* artifacts/build-ubuntu-latest/RGT_linux || true
          mv artifacts/build-macos-latest/* artifacts/build-macos-latest/RGT_macos || true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: |
            artifacts/build-ubuntu-latest/RGT_linux
            artifacts/build-macos-latest/RGT_macos